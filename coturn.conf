# Coturn TURN/STUN server configuration
# For Matrix VoIP and video calling

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay ports for media (adjusted to avoid LiveKit SFU range 50000-60000)
min-port=60001
max-port=65535

# External IPs (your server's public IPs)
external-ip=YOUR_IPV4
external-ip=YOUR_IPV6

# Realm (should match your Matrix domain)
realm=YOUR_DOMAIN
server-name=YOUR_DOMAIN

# Authentication - use shared secret
use-auth-secret
static-auth-secret=PLACEHOLDER_TURN_SECRET

# ── TLS Certificates ──────────────────────────────────────────────
# Caddy's Let's Encrypt certs are mounted read-only from caddy_data volume.
# caddy_data is mounted at /etc/coturn/caddy-data in the coturn container.
# Update paths below with YOUR_DOMAIN after configuring.
cert=/etc/coturn/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/YOUR_DOMAIN/YOUR_DOMAIN.crt
pkey=/etc/coturn/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/YOUR_DOMAIN/YOUR_DOMAIN.key

# Quota and permissions - UNLIMITED for better performance
# Remove quota restrictions for production use
# total-quota=100
# bps-capacity=0

# Security settings
no-multicast-peers
no-cli
# Block private IP ranges from being relayed (security)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
# CGNAT (RFC 6598)
denied-peer-ip=100.64.0.0-100.127.255.255
# Loopback
denied-peer-ip=127.0.0.0-127.255.255.255
# Link-local
denied-peer-ip=169.254.0.0-169.254.255.255
# IPv6 loopback
denied-peer-ip=::1-::1
# IPv6 link-local
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
# IPv6 ULA (private)
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Allow loopback for testing
# no-loopback-peers

# Logging
# Log to stdout for Docker log collection
log-file=stdout
# Enable verbose for troubleshooting (disable in production if needed)
# verbose

# Performance
# Use multiple listening IPs
listening-ip=0.0.0.0
listening-ip=::

# Fingerprinting
fingerprint

# Disable software attribute in TURN messages
no-software-attribute

# Allow TURN over TCP
tcp-proxy-port=3478

# Mobility support
mobility

# Disable unauthenticated STUN to prevent UDP amplification attacks (Shadowserver CVE)
# Authenticated TURN users still get mapped-address discovery via TURN allocations.
no-stun

# Performance optimizations
max-bps=2000000
user-quota=0
total-quota=0

# Prometheus metrics (optional)
# prometheus
