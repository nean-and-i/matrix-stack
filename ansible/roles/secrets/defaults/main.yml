---
# Role: secrets
# Generates and manages cryptographic secrets for the Matrix stack.
# Idempotent: only generates secrets if they don't exist.

secrets_dir: "{{ matrix_install_dir }}"

secret_files:
  registration_token:
    file: "registration_token"
    length: 32
    description: "Matrix homeserver registration token"
  turn_shared_secret:
    file: "turn_shared_secret"
    length: 64
    description: "TURN server shared secret"
  livekit_api_key:
    file: "livekit_api_key"
    length: 32
    description: "LiveKit API key"
  livekit_api_secret:
    file: "livekit_api_secret"
    length: 64
    description: "LiveKit API secret"

secret_file_mode: "0600"
