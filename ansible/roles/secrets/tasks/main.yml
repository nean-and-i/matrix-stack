---
# Role: secrets
# Generates cryptographic secrets for the Matrix homeserver stack.
# Idempotent: preserves existing secrets on rerun.

- name: Ensure secrets directory exists
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate registration token
  when: registration_token is not defined
  block:
    - name: Check if registration token exists
      ansible.builtin.stat:
        path: "{{ secrets_dir }}/registration_token"
      register: registration_token_file

    - name: Generate registration token
      ansible.builtin.shell: python3 -c "import secrets; print(secrets.token_hex(16))"
      register: registration_token_gen
      when: not registration_token_file.stat.exists

    - name: Write registration token
      ansible.builtin.copy:
        content: "{{ registration_token_gen.stdout }}"
        dest: "{{ secrets_dir }}/registration_token"
        owner: root
        group: root
        mode: "{{ secret_file_mode }}"
      when: not registration_token_file.stat.exists
  vars:
    registration_token: "{{ lookup('file', secrets_dir + '/registration_token') | default('') }}"

- name: Read existing registration token
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/registration_token"
  register: registration_token_slurp
  changed_when: false

- name: Set registration_token fact
  ansible.builtin.set_fact:
    registration_token: "{{ registration_token_slurp.content | b64decode | trim }}"

- name: Generate TURN shared secret
  when: turn_shared_secret is not defined
  block:
    - name: Check if TURN secret exists
      ansible.builtin.stat:
        path: "{{ secrets_dir }}/turn_shared_secret"
      register: turn_secret_file

    - name: Generate TURN shared secret
      ansible.builtin.shell: python3 -c "import secrets; print(secrets.token_hex(32))"
      register: turn_secret_gen
      when: not turn_secret_file.stat.exists

    - name: Write TURN shared secret
      ansible.builtin.copy:
        content: "{{ turn_secret_gen.stdout }}"
        dest: "{{ secrets_dir }}/turn_shared_secret"
        owner: root
        group: root
        mode: "{{ secret_file_mode }}"
      when: not turn_secret_file.stat.exists
  vars:
    turn_shared_secret: "{{ lookup('file', secrets_dir + '/turn_shared_secret') | default('') }}"

- name: Read existing TURN shared secret
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/turn_shared_secret"
  register: turn_secret_slurp
  changed_when: false

- name: Set turn_shared_secret fact
  ansible.builtin.set_fact:
    turn_shared_secret: "{{ turn_secret_slurp.content | b64decode | trim }}"

- name: Generate LiveKit API key
  when: livekit_api_key is not defined
  block:
    - name: Check if LiveKit API key exists
      ansible.builtin.stat:
        path: "{{ secrets_dir }}/livekit_api_key"
      register: livekit_key_file

    - name: Generate LiveKit API key
      ansible.builtin.shell: python3 -c "import secrets; print(secrets.token_hex(16))"
      register: livekit_key_gen
      when: not livekit_key_file.stat.exists

    - name: Write LiveKit API key
      ansible.builtin.copy:
        content: "{{ livekit_key_gen.stdout }}"
        dest: "{{ secrets_dir }}/livekit_api_key"
        owner: root
        group: root
        mode: "{{ secret_file_mode }}"
      when: not livekit_key_file.stat.exists
  vars:
    livekit_api_key: "{{ lookup('file', secrets_dir + '/livekit_api_key') | default('') }}"

- name: Read existing LiveKit API key
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/livekit_api_key"
  register: livekit_key_slurp
  changed_when: false

- name: Set livekit_api_key fact
  ansible.builtin.set_fact:
    livekit_api_key: "{{ livekit_key_slurp.content | b64decode | trim }}"

- name: Generate LiveKit API secret
  when: livekit_api_secret is not defined
  block:
    - name: Check if LiveKit API secret exists
      ansible.builtin.stat:
        path: "{{ secrets_dir }}/livekit_api_secret"
      register: livekit_secret_file

    - name: Generate LiveKit API secret
      ansible.builtin.shell: python3 -c "import secrets; print(secrets.token_hex(32))"
      register: livekit_secret_gen
      when: not livekit_secret_file.stat.exists

    - name: Write LiveKit API secret
      ansible.builtin.copy:
        content: "{{ livekit_secret_gen.stdout }}"
        dest: "{{ secrets_dir }}/livekit_api_secret"
        owner: root
        group: root
        mode: "{{ secret_file_mode }}"
      when: not livekit_secret_file.stat.exists
  vars:
    livekit_api_secret: "{{ lookup('file', secrets_dir + '/livekit_api_secret') | default('') }}"

- name: Read existing LiveKit API secret
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/livekit_api_secret"
  register: livekit_secret_slurp
  changed_when: false

- name: Set livekit_api_secret fact
  ansible.builtin.set_fact:
    livekit_api_secret: "{{ livekit_secret_slurp.content | b64decode | trim }}"

- name: Display secrets status
  ansible.builtin.debug:
    msg:
      - "Secrets generated/verified in {{ secrets_dir }}"
      - "registration_token: {{ registration_token[0:8] }}... (length: {{ registration_token | length }})"
      - "turn_shared_secret: {{ turn_shared_secret[0:8] }}... (length: {{ turn_shared_secret | length }})"
      - "livekit_api_key: {{ livekit_api_key[0:8] }}... (length: {{ livekit_api_key | length }})"
      - "livekit_api_secret: {{ livekit_api_secret[0:8] }}... (length: {{ livekit_api_secret | length }})"
