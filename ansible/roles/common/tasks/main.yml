---
# Role: common
# Installs base system packages required by the Matrix stack.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required system packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - jq
      - git
      - ca-certificates
      - gnupg
      - lsb-release
      - openssl
      - ufw
      - python3-pip
      - python3-docker
    state: present

- name: Create Matrix installation directory
  ansible.builtin.file:
    path: "{{ matrix_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ matrix_install_dir }}/wellknown/matrix"
    - "{{ matrix_install_dir }}/logs"
