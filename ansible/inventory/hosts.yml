---
all:
  children:
    matrix_servers:
      hosts:
        YOUR_DOMAIN:  # Use your actual domain here
          ansible_host: YOUR_IPV4  # Server public IPv4 address
          ansible_user: wheel  # SSH user (adjust if different)
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519  # Path to SSH private key
          # Override any group_vars per-host here if needed:
          # matrix_domain: your-domain.com
          # matrix_server_ipv4: 1.2.3.4
